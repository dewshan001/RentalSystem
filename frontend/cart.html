<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - RentalSystem</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="brand">🏠 RentalSystem</a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/cart">Cart</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div id="alert" class="alert"></div>

      <h1>Shopping Cart</h1>

      <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem; margin-top: 2rem;">
        <section>
          <div id="cartContent">
            <div class="loading">
              <div class="spinner"></div>
              <p>Loading cart...</p>
            </div>
          </div>
        </section>

        <aside>
          <div class="card" id="cartTotal" style="display: none;">
            <h3>Order Summary</h3>
            <hr>
            <div style="display: flex; justify-content: space-between; margin: 1rem 0;">
              <span>Subtotal:</span>
              <strong id="subtotal">Rs0.00</strong>
            </div>
            <div style="display: flex; justify-content: space-between; margin: 1rem 0; padding-top: 1rem; border-top: 1px solid #ecf0f1;">
              <span style="font-size: 1.2rem;">Total:</span>
              <strong id="total" style="font-size: 1.1rem; color: #27ae60;">Rs0.00</strong>
            </div>
            <button onclick="checkout()" class="success" style="width: 100%; margin-top: 1rem;">Proceed to Checkout</button>
            <button onclick="clearCart()" class="danger" style="width: 100%; margin-top: 0.5rem;">Clear Cart</button>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/cart.js"></script>
</body>
</html>

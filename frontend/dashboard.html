<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - RentalSystem</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .cart-badge {
      background: #e74c3c;
      color: #fff;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 50%;
      position: absolute;
      top: -6px;
      right: -14px;
      min-width: 18px;
      text-align: center;
      line-height: 1.3;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .cart-badge.bounce {
      animation: cartBounce 0.45s ease;
    }
    @keyframes cartBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.5); }
      50%  { transform: scale(0.9); }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="brand">🏠 RentalSystem</a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/cart" style="position: relative;">Cart <span id="cartBadge" class="cart-badge" style="display:none;">0</span></a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div id="alert" class="alert"></div>

      <div class="dashboard-header">
        <h1>Welcome to Your Dashboard</h1>
        <p>Browse and rent items from our collection</p>
      </div>

      <section>
        <h2 class="mb-3">Browse Tools & Equipment</h2>
        
        <!-- Filters -->
        <div style="margin-bottom: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div>
            <input 
              type="text" 
              id="searchInput" 
              placeholder="Search items..." 
              style="width: 100%; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 1rem;"
              onkeyup="filterItems()">
          </div>
          <div>
            <select 
              id="categoryFilter" 
              style="width: 100%; padding: 0.75rem; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 1rem;"
              onchange="filterItems()">
              <option value="">All Categories</option>
            </select>
          </div>
        </div>

        <div class="grid" id="itemsContainer">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading items...</p>
          </div>
        </div>
      </section>

      <section id="cartSummary" style="display: none;">
        <div class="card">
          <h3>Cart Summary</h3>
          <p>Items in cart: <strong id="cartCount">0</strong></p>
          <a href="/cart" class="btn">View Cart</a>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>

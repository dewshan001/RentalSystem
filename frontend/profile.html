<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - RentalSystem</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="brand">🏠 RentalSystem</a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/cart">Cart</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div id="alert" class="alert"></div>

      <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem; margin-top: 2rem;">
        <section>
          <div class="profile-section">
            <h2>Update Your Profile</h2>
            <form id="profileForm">
              <div class="form-row">
                <div class="form-group">
                  <label for="name">Full Name</label>
                  <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                  <label for="email">Email (Read-only)</label>
                  <input type="email" id="email" name="email" disabled>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="phone">Phone Number</label>
                  <input type="tel" id="phone" name="phone">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="address">Address</label>
                  <input type="text" id="address" name="address">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" name="city">
                </div>
                <div class="form-group">
                  <label for="state">State</label>
                  <input type="text" id="state" name="state">
                </div>
              </div>

              <div class="form-group">
                <label for="zipCode">Zip Code</label>
                <input type="text" id="zipCode" name="zipCode">
              </div>

              <button type="submit" class="success">Update Profile</button>
            </form>
          </div>

          <div class="profile-section">
            <h2>Your Active Rentals</h2>
            <div id="rentalsContent">
              <div class="loading">
                <div class="spinner"></div>
                <p>Loading rentals...</p>
              </div>
            </div>
          </div>
        </section>

        <aside>
          <div class="profile-section">
            <h3>Account Actions</h3>
            <button onclick="deleteAccount()" class="danger" style="width: 100%; margin-top: 1rem;">Delete Account</button>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-top: 1rem;">⚠️ This action cannot be undone.</p>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>

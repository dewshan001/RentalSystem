<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - RentalSystem</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="brand">🏠 RentalSystem</a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/cart">Cart</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div id="alert" class="alert"></div>

      <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem; margin-top: 2rem;">
        <section>
          <div class="profile-section">
            <h2>Update Your Profile</h2>
            <form id="profileForm">
              <div class="form-row">
                <div class="form-group">
                  <label for="name">Full Name</label>
                  <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                  <label for="email">Email (Read-only)</label>
                  <input type="email" id="email" name="email" disabled>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="phone">Phone Number</label>
                  <input type="tel" id="phone" name="phone">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="address">Address</label>
                  <input type="text" id="address" name="address">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" name="city">
                </div>
                <div class="form-group">
                  <label for="state">State</label>
                  <input type="text" id="state" name="state">
                </div>
              </div>

              <div class="form-group">
                <label for="zipCode">Zip Code</label>
                <input type="text" id="zipCode" name="zipCode">
              </div>

              <button type="submit" class="success">Update Profile</button>
            </form>
          </div>

          <div class="profile-section">
            <h2>Your Active Rentals</h2>
            <div id="rentalsContent">
              <div class="loading">
                <div class="spinner"></div>
                <p>Loading rentals...</p>
              </div>
            </div>
          </div>
        </section>

        <aside>
          <div class="profile-section">
            <h3>Account Actions</h3>
            <button onclick="deleteAccount()" class="danger" style="width: 100%; margin-top: 1rem;">Delete Account</button>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-top: 1rem;">⚠️ This action cannot be undone.</p>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="/utils.js"></script>
  <script>
    requireLogin();

    async function loadProfile() {
      try {
        const profile = await getProfile();
        document.getElementById('name').value = profile.name;
        document.getElementById('email').value = profile.email;
        document.getElementById('phone').value = profile.phone || '';
        document.getElementById('address').value = profile.address || '';
        document.getElementById('city').value = profile.city || '';
        document.getElementById('state').value = profile.state || '';
        document.getElementById('zipCode').value = profile.zipCode || '';
      } catch (error) {
        showError(error);
      }
    }

    async function loadRentals() {
      try {
        const rentals = await getRentals();

        if (!rentals || rentals.length === 0) {
          document.getElementById('rentalsContent').innerHTML = '<p class="text-center">No active rentals</p>';
          return;
        }

        const html = rentals.map(rental => {
          const startDate = new Date(rental.startDate).toLocaleDateString();
          const endDate = new Date(rental.endDate).toLocaleDateString();
          const itemName = rental.itemId?.name || 'Unknown Item';

          return `
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: start;">
                <div>
                  <h4>${itemName}</h4>
                  <p><small>Status: <strong>${rental.status}</strong></small></p>
                  <p><small>Start: ${startDate}</small></p>
                  <p><small>End: ${endDate}</small></p>
                  <p><strong>Total: Rs${rental.totalPrice.toFixed(2)}</strong></p>
                </div>
                ${rental.status === 'active' ? `
                  <button onclick="cancelRentalItem('${rental._id}')" class="danger" style="font-size: 0.85rem; padding: 0.5rem;">Cancel</button>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');

        document.getElementById('rentalsContent').innerHTML = html;
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        const data = {
          name: document.getElementById('name').value,
          phone: document.getElementById('phone').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zipCode: document.getElementById('zipCode').value,
        };

        await updateProfile(data);
        showMessage('Profile updated successfully!', 'success');
      } catch (error) {
        showError(error);
      }
    });

    async function cancelRentalItem(rentalId) {
      if (!confirm('Are you sure you want to cancel this rental?')) return;

      try {
        await cancelRental(rentalId);
        showMessage('Rental cancelled', 'success');
        loadRentals();
      } catch (error) {
        showError(error);
      }
    }

    async function deleteAccount() {
      const confirmDelete = confirm('Are you sure you want to delete your account? This action cannot be undone.');
      if (!confirmDelete) return;

      const confirmAgain = confirm('This will permanently delete your account and all associated data. Are you absolutely sure?');
      if (!confirmAgain) return;

      try {
        await apiCall('/auth/account', 'DELETE');
        showMessage('Account deleted successfully', 'success');
        setTimeout(() => {
          logout();
        }, 1500);
      } catch (error) {
        showError(error);
      }
    }

    loadProfile();
    loadRentals();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RentalSystem</title>
  <link rel="stylesheet" href="/auth-modern.css">
</head>
<body class="auth-split-layout">
  <div class="auth-banner">
    <div class="auth-banner-content">
      <h1>Join RentalSystem<br>Today</h1>
      <p>Sign up now to browse our catalog, manage current rentals, and enjoy a seamless experience.</p>
    </div>
  </div>

  <div class="auth-content">
    <div class="auth-content-inner">
      <div id="alert" class="alert" style="display: none; padding: 12px; margin-bottom: 20px; border-radius: 6px;"></div>

      <h2>Create Account</h2>
      <p class="auth-subtitle">Start your rental journey with a secure new account.</p>
      
      <form id="registerForm">
        <div class="modern-form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" class="modern-input" placeholder="John Doe" required>
        </div>

        <div class="modern-form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="modern-input" placeholder="john@example.com" required>
          <small id="emailError" style="color: #e74c3c; display: none; margin-top: 5px; font-weight: 500;"></small>
        </div>

        <div style="display: flex; gap: 15px;">
          <div class="modern-form-group" style="flex: 1;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="modern-input" placeholder="Min. 6 characters" required>
          </div>
          <div class="modern-form-group" style="flex: 1;">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" class="modern-input" placeholder="Repeat password" required>
            <small id="passwordMatchError" style="color: #e74c3c; display: none; margin-top: 5px; font-weight: 500;"></small>
          </div>
        </div>

        <div class="modern-form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="modern-input" placeholder="10 digits required">
          <small id="phoneError" style="color: #e74c3c; display: none; margin-top: 5px; font-weight: 500;"></small>
        </div>

        <button type="submit" class="modern-btn">Register</button>

        <p class="modern-auth-links">
          Already have an account? <a href="/login">Sign In</a>
        </p>
      </form>
    </div>
  </div>

  <script src="/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const registerForm = document.getElementById('registerForm');
      if (registerForm) {
        registerForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = document.getElementById('name').value.trim();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const confirmPassword = document.getElementById('confirmPassword').value;
          const phone = document.getElementById('phone').value.trim();
          
          const passwordMatchError = document.getElementById('passwordMatchError');
          const emailError = document.getElementById('emailError');
          const phoneError = document.getElementById('phoneError');
          
          let hasError = false;

          passwordMatchError.style.display = 'none';
          emailError.style.display = 'none';
          phoneError.style.display = 'none';

          if (password !== confirmPassword) {
            passwordMatchError.textContent = 'Passwords do not match';
            passwordMatchError.style.display = 'block';
            hasError = true;
          }

          if (phone && !/^\d{10}$/.test(phone)) {
            phoneError.textContent = 'Phone must be 10 digits';
            phoneError.style.display = 'block';
            hasError = true;
          }

          if (hasError) return;

          try {
            const response = await fetch('/api/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, email, password, phone, role: 'user' })
            });
            const data = await response.json();
            
            if (response.ok) {
              showAlert('Registration successful! Redirecting to login...', 'success');
              setTimeout(() => {
                window.location.href = '/login';
              }, 2000);
            } else {
              showAlert(data.message || 'Registration failed', 'error');
            }
          } catch (error) {
            console.error('Registration error:', error);
            showAlert('Cannot connect to server', 'error');
          }
        });
      }
    });

    // Defining showAlert function locally overrides utils.js generic one if any, or supports page local
    function showAlert(message, type) {
      const alertDiv = document.getElementById('alert');
      alertDiv.textContent = message;
      alertDiv.style.display = 'block';
      alertDiv.style.background = type === 'success' ? '#d4edda' : '#feeced';
      alertDiv.style.color = type === 'success' ? '#155724' : '#dc3545';
      alertDiv.style.borderColor = type === 'success' ? '#c3e6cb' : '#f5c6cb';
    }
  </script>
</body>
</html>

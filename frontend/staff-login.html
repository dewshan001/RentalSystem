<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - RentalSystem</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page auth-login-page">
  <div class="glass-shape glass-shape-1"></div>
  <div class="glass-shape glass-shape-2"></div>

  <main>
    <div class="container">
      <div id="alert" class="alert" style="display: none; width: 100%; max-width: 450px; margin: 0 auto 1.5rem;"></div>

      <div class="glass-panel">
        <h1 class="text-center mb-4">Staff Login</h1>
        <p class="auth-subtitle text-center">Rental System Administration Portal</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="glass-input" placeholder="Enter your staff email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="glass-input" placeholder="Enter your password" required>
          </div>

          <div class="loading" id="loading" style="display: none; padding: 0.8rem 0;">Logging in...</div>

          <button type="submit" class="glass-btn" id="loginBtn">Login</button>

          <div style="text-align: center; margin: 1rem 0 0.6rem;">
            <a href="/" style="display: inline-block; padding: 10px 20px; background: rgba(52, 152, 219, 0.5); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: all 0.3s; border: 1px solid rgba(52, 152, 219, 0.7);">
              Back to Home
            </a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const messageEl = document.getElementById('alert');
    const loadingEl = document.getElementById('loading');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMessage('Please enter email and password', 'error');
        return;
      }

      try {
        loadingEl.style.display = 'block';
        loginBtn.disabled = true;

        const response = await fetch('/api/staff/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.message || 'Login failed', 'error');
          console.error('Login failed:', data);
          return;
        }

        // Store staff info in localStorage
        localStorage.setItem('staffId', data.staffId);
        localStorage.setItem('staffName', data.staff.name);
        localStorage.setItem('staffEmail', data.staff.email);
        localStorage.setItem('staffRole', data.staff.role);

        showMessage('Login successful! Redirecting...', 'success');

        // Redirect based on role
        setTimeout(() => {
          if (data.staff.role === 'admin') {
            window.location.href = '/admin-dashboard';
          } else if (data.staff.role === 'shop') {
            window.location.href = '/shop-dashboard';
          } else if (data.staff.role === 'warehouse') {
            window.location.href = '/warehouse-dashboard';
          } else {
            showMessage('Unknown role: ' + data.staff.role, 'error');
          }
        }, 500);
      } catch (error) {
        console.error('Login error:', error);
        showMessage('Error connecting to server: ' + error.message, 'error');
      } finally {
        loadingEl.style.display = 'none';
        loginBtn.disabled = false;
      }
    });

    function showMessage(msg, type) {
      messageEl.textContent = msg;
      messageEl.className = `alert alert-${type} show`;
      messageEl.style.display = 'block';
      setTimeout(() => {
        messageEl.style.display = 'none';
        messageEl.classList.remove('show');
      }, 5000);
    }
  </script>
</body>
</html>

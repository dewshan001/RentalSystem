<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - RentalSystem</title>
  <link rel="stylesheet" href="/auth-modern.css">
  <style>
    /* Small exception for staff banner to differentiate from user login */
    .auth-banner.staff-banner {
      background: linear-gradient(135deg, #2b5876, #4e4376);
    }
  </style>
</head>
<body class="auth-split-layout">
  <div class="auth-banner staff-banner">
    <div class="auth-banner-content">
      <h1>Staff Portal</h1>
      <p>Secure access for Rental System Administration and Staff Management.</p>
    </div>
  </div>

  <div class="auth-content">
    <div class="auth-content-inner">
      <div id="alert" class="alert" style="display: none; padding: 12px; margin-bottom: 20px; border-radius: 6px; background: #feeced; color: #dc3545; border: 1px solid #f5c6cb;"></div>

      <h2>Staff Login</h2>
      <p class="auth-subtitle">Welcome back. Please login to access your dashboard.</p>
      
      <form id="loginForm">
        <div class="modern-form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="modern-input" placeholder="Enter your staff email" required>
        </div>

        <div class="modern-form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="modern-input" placeholder="Enter your password" required>
        </div>

        <div class="loading" id="loading" style="display: none; padding: 0.8rem 0; color: #666; font-size: 0.9rem; text-align: center;">Authenticating...</div>

        <button type="submit" class="modern-btn" id="loginBtn">Login</button>

        <div class="divider">or</div>
        
        <div class="secondary-actions">
          <a href="/login" class="btn-outline">User Login</a>
          <a href="/" class="btn-outline">Back to Home</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/utils.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const messageEl = document.getElementById('alert');
    const loadingEl = document.getElementById('loading');
    const loginBtn = document.getElementById('loginBtn');

    // Display alert helper
    function showMessage(message, type) {
      messageEl.textContent = message;
      messageEl.style.display = 'block';
      messageEl.style.background = type === 'success' ? '#d4edda' : '#feeced';
      messageEl.style.color = type === 'success' ? '#155724' : '#dc3545';
      messageEl.style.borderColor = type === 'success' ? '#c3e6cb' : '#f5c6cb';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      messageEl.style.display = 'none';

      if (!email || !password) {
        showMessage('Please enter email and password', 'error');
        return;
      }

      try {
        loadingEl.style.display = 'block';
        loginBtn.disabled = true;

        const response = await fetch('/api/staff/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        loadingEl.style.display = 'none';
        loginBtn.disabled = false;

        if (!response.ok) {
          showMessage(data.message || 'Login failed', 'error');
          console.error('Login failed:', data);
          return;
        }

        // Store staff info in localStorage
        localStorage.setItem('staffId', data.staffId);
        localStorage.setItem('staffName', data.staff.name);
        localStorage.setItem('staffEmail', data.staff.email);
        localStorage.setItem('staffRole', data.staff.role);
        
        if (data.token) localStorage.setItem('token', data.token);

        showMessage('Login successful! Redirecting...', 'success');

        // Redirect based on role
        setTimeout(() => {
          if (data.staff.role === 'admin') {
            window.location.href = '/admin-dashboard';
          } else if (data.staff.role === 'shop') {
            window.location.href = '/shop-dashboard';
          } else if (data.staff.role === 'warehouse') {
            window.location.href = '/warehouse-dashboard';
          } else if (data.staff.role === 'billing') {
            window.location.href = '/billing-dashboard';
          } else {
            showMessage('Unknown role: ' + data.staff.role, 'error');
          }
        }, 800);
      } catch (error) {
        loadingEl.style.display = 'none';
        loginBtn.disabled = false;
        console.error('Login error:', error);
        showMessage('Error connecting to server', 'error');
      }
    });
  </script>
</body>
</html>
